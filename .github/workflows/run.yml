name: Auto Post From Sheet

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
        run: python main.py

      - name: Save seen files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add seen_*.json || echo "No seen files"
          git commit -m "Update seen files" || echo "No changes to commit"
          git push
