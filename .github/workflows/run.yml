name: Auto Post Other Site

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID_OTHER: ${{ secrets.CHAT_ID_OTHER }}
        run: python main.py

      - name: Save seen articles
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add seen_other_site.json
          git commit -m "Update seen other site articles" || echo "No changes to commit"
          git push
